services:

  backend:
    build: ./backend
    container_name: leads_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: leads_frontend
    ports:
      - "4173:4173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped